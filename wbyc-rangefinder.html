  :root{
    --bg:#151009; --card:#17211c; --card2:#233229; --line:#2b3a31;
    --text:#e8f0ea; --dim:#8fa398; --accent:#9db4f0; --accent2:#e8c468;
    --blue:#85b9ea; --white-tee:#e8f0ea; --gold:#ffc72c; --red:#fb637e;
    --water:#3a6ea5; --sand:#f0dfb8; --green-fill:#1fee75;
    --cl:#4a5c51; --green-stroke:#6bff96; --fcb:#cfe8d5; --chiptext:#0e1512;
    --topo:#4db3f5; --topo-index:#8ad4ff;
  }
  /* SUN MODE — max contrast for direct sunlight */
  body.sun{
    --bg:#f5edda; --card:#ffffff; --card2:#eff5ea; --line:#c9c2b2;
    --text:#111111; --dim:#4a4a42; --accent:#4a5fae; --accent2:#b45309;
    --blue:#4d84c4; --white-tee:#cfd4da; --gold:#ffc72c; --red:#fb637e;
    --water:#1e4d8c; --sand:#e8c878; --green-fill:#17d562;
    --cl:#6b6555; --green-stroke:#43f976; --fcb:#ffffff; --chiptext:#ffffff;
    --topo:#5aa8f0; --topo-index:#1f6fe0;
  }
  body.sun .tees button.sel.White{color:#111}
  body.sun .dist .val{font-weight:900}
  /* DREAM MODE — surreal night theme */
  body.dream{
    --bg:#170b2e; --card:#131338; --card2:#212158; --line:#2b2b5e;
    --text:#e6e6ff; --dim:#9a9ac4; --accent:#aca7fa; --accent2:#e879f9;
    --blue:#9daafa; --white-tee:#cdd3f5; --gold:#ffc72c; --red:#fb637e;
    --water:#4c6ef5; --sand:#ecdff8; --green-fill:#09fdb8;
    --cl:#5b5b9e; --green-stroke:#6cffd1; --fcb:#ffffff; --chiptext:#0b0b2a;
    --topo:#4de0ff; --topo-index:#b088ff;
  }
  body.dream #map .ctr{stroke-dasharray:5 9;animation:ctrflow 7s linear infinite}
  body.dream #map .ctr.idx{stroke-dasharray:10 6;animation:ctrflowi 11s linear infinite}
  @keyframes ctrflow{to{stroke-dashoffset:-56px}}
  @keyframes ctrflowi{to{stroke-dashoffset:-48px}}
  body.dream #map .greenp{animation:dreampulse 4s ease-in-out infinite}
  @keyframes dreampulse{0%,100%{fill-opacity:.75}50%{fill-opacity:1}}
  body.dream #map .star{animation:twinkle 3s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.12}50%{opacity:.9}}
  /* flowing shoreline ripples on water (all themes) */
  #map .ripple{stroke-dasharray:4 7;stroke-linecap:round;animation:rippleflow 8s linear infinite}
  @keyframes rippleflow{to{stroke-dashoffset:-44px}}
  /* "my ball" marker: hot gold glow + pulsing halo ring around the player position */
  #map .you-pulse{transform-box:fill-box;transform-origin:center;animation:youpulse 2.2s ease-out infinite}
  @keyframes youpulse{0%{transform:scale(.6);opacity:.9}70%{transform:scale(2.2);opacity:0}100%{transform:scale(2.2);opacity:0}}
  #map .you-glow{transform-box:fill-box;transform-origin:center;animation:youglow 1.4s ease-in-out infinite alternate}
  @keyframes youglow{from{transform:scale(.85);opacity:.75}to{transform:scale(1.15);opacity:1}}
  #map .you-search{transform-box:fill-box;transform-origin:center;animation:yousearch 1.1s ease-in-out infinite alternate}
  @keyframes yousearch{from{transform:scale(.8);opacity:.55}to{transform:scale(1.25);opacity:1}}
  /* loading burgee: pole raises, pennant unfurls from the mast, then flutters */
  #map .burgee-load{animation:burgeeRaise .5s ease-out both}
  @keyframes burgeeRaise{from{transform:translateY(6px);opacity:0}to{transform:translateY(0);opacity:1}}
  #map .burgee-wave{animation:burgeeUnfurl .7s .35s ease-out both, burgeeFlutter 2.6s 1.05s ease-in-out infinite}
  @keyframes burgeeUnfurl{from{transform:scaleX(.04)}to{transform:scaleX(1)}}
  @keyframes burgeeFlutter{0%,100%{transform:skewY(0deg) scaleX(1)}25%{transform:skewY(-2.2deg) scaleX(.985)}60%{transform:skewY(2.6deg) scaleX(1.01)}}
  /* weather flourishes — real sky over the course */
  #map .wx-mist{animation:wxmist 9s ease-in-out infinite}
  @keyframes wxmist{0%,100%{opacity:.08}50%{opacity:.2}}
  #map .wx-rain line{animation:wxrain 1.1s linear infinite}
  @keyframes wxrain{from{transform:translateY(-6px);opacity:0}20%{opacity:.6}to{transform:translateY(10px);opacity:0}}
  #map .wx-flake{animation:wxflake 4s ease-in-out infinite}
  @keyframes wxflake{from{transform:translateY(-4px);opacity:0}30%{opacity:.9}to{transform:translateY(12px);opacity:0}}
  body.dream .dist .val{color:var(--accent);text-shadow:0 0 14px rgba(110,231,255,.75)}
  body.dream .dist .box.center .val{text-shadow:0 0 18px rgba(110,231,255,.9)}
  #d3ex{width:110px;accent-color:var(--accent)}
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden}
  #confetti b{position:absolute;top:-24px;width:13px;height:13px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#fff,#d8d8d8);box-shadow:inset -2px -2px 3px rgba(0,0,0,.3);
    animation:balldrop 3.6s cubic-bezier(.3,.4,.6,1) forwards}
  @keyframes balldrop{to{transform:translateY(112vh) rotate(720deg)}}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       min-height:100vh;user-select:none;-webkit-user-select:none}
  #app{max-width:480px;margin:0 auto;padding:2px 12px 24px}

  header{display:flex;align-items:center;justify-content:space-between;padding:0 2px}
  header h1{font-family:'EB Garamond',Garamond,Baskerville,'Times New Roman',serif;
    font-weight:500;text-transform:uppercase;line-height:1;text-align:left}
  header h1 .h1a{display:block;font-size:28.8px;letter-spacing:1.6px}
  header h1 .h1b{display:block;font-size:16px;letter-spacing:1.4px;margin-top:3px}
  header .sub{font-size:11px;color:var(--dim)}
  #tagline{display:flex;justify-content:space-between;align-items:center;margin:2px 0 8px}
  #pname{font-family:'EB Garamond',Garamond,Baskerville,'Times New Roman',serif;font-style:italic;
    font-weight:500;font-size:14px;color:var(--text);cursor:pointer;padding:4px 6px 4px 12px;
    letter-spacing:.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:45%}
  #pname.unset{color:var(--dim);opacity:.75}
  #tagline a{display:inline-block;font-family:'EB Garamond',Garamond,Baskerville,'Times New Roman',serif;
    font-weight:500;font-style:italic;font-size:13.5px;color:#3a2405;text-decoration:none;
    background:linear-gradient(135deg,#fbe9b8 0%,#f6d47c 55%,#eeb86a 100%);
    border:1px solid rgba(185,135,60,.35);border-radius:999px;
    padding:4px 18px;letter-spacing:.4px;line-height:1.3;
    box-shadow:0 1px 3px rgba(220,160,80,.18)}
  #tagline a:active{background:linear-gradient(135deg,#f6dd9a,#e5a95c)}

  .holebar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .holebar button{background:var(--card);border:1px solid var(--line);color:var(--text);
    border-radius:10px;font-size:20px;width:46px;height:46px;cursor:pointer}
  .holebar button:active{background:var(--card2)}
  .holeinfo{flex:1;background:var(--card);border:1px solid var(--line);border-radius:10px;
    height:46px;display:flex;align-items:center;justify-content:center;gap:14px}
  .holeinfo .num{font-size:27px;font-weight:800;white-space:nowrap}
  .holeinfo .meta{font-size:12px;color:var(--dim);line-height:1.25;text-align:left}
  #autoBtn{font-size:10px;font-weight:700;letter-spacing:.5px}
  #autoBtn.on{border-color:var(--accent);color:var(--accent)}

  .tees{display:flex;gap:6px;margin-bottom:10px}
  .tees button{flex:1;padding:7px 0;border-radius:8px;border:1px solid var(--line);
    background:var(--card);color:var(--dim);font-size:12px;font-weight:600;cursor:pointer}
  .tees button.sel{color:var(--chiptext);border-color:transparent}
  #sunBtn{background:var(--card);border:1px solid var(--line);color:var(--text);
    border-radius:8px;width:32px;height:32px;font-size:16px;cursor:pointer;line-height:1;flex-shrink:0}
  .tees button.sel.Blue{background:var(--blue)} .tees button.sel.White{background:var(--white-tee)}
  .tees button.sel.Gold{background:var(--gold);color:#161616} .tees button.sel.Red{background:var(--red);color:#fff}
  .tees button.sel.Green{background:#7fe0a8;color:#0e1512}

  .dist{display:flex;gap:8px;margin-bottom:10px}
  .dist .box{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:10px 4px;text-align:center}
  .dist .box.center{background:var(--card2);border-color:var(--accent)}
  .dist .lbl{font-size:10px;color:var(--dim);letter-spacing:1px;font-weight:600}
  .dist .val{font-size:34px;font-weight:800;line-height:1.15;font-variant-numeric:tabular-nums}
  .dist .box.center .val{font-size:44px;color:var(--accent)}
  .dist .plays{font-size:11px;font-weight:700;color:var(--accent2);min-height:14px}

  #mapwrap{background:var(--card);border:1px solid var(--line);border-radius:12px;
    margin-bottom:10px;overflow:hidden;position:relative;touch-action:pan-y}
  #mapbtns{position:absolute;top:8px;right:8px;display:flex;gap:6px}
  #shotbar{position:absolute;bottom:22px;left:8px;display:flex;gap:6px;align-items:center}
  #shotbar select{background:rgba(10,16,12,.62);color:#fff;border:2px solid #35c8ff;border-radius:7px;
    padding:6px 7px;font-size:13px;font-weight:900;letter-spacing:1.2px;backdrop-filter:blur(2px)}
  #shotbar button{background:rgba(10,16,12,.62);color:#fff;border:2px solid var(--accent2);border-radius:7px;
    padding:6px 12px;font-size:13px;font-weight:900;letter-spacing:.6px;cursor:pointer;backdrop-filter:blur(2px);transition:background .12s,border-color .12s,color .12s}
  #shotbar button.marking{background:#12d17a;border-color:#0aa860;color:#04150c;animation:shotflash .5s ease-out}
  @keyframes shotflash{0%{transform:scale(1)}35%{transform:scale(1.14)}100%{transform:scale(1)}}
  body.sun #shotbar select, body.sun #shotbar button{background:rgba(255,255,255,.75);color:#111}
  #mapbtns button{background:rgba(10,16,12,.55);color:#fff;border:2px solid #35c8ff;border-radius:7px;
    padding:5px 9px;font-size:10px;font-weight:700;letter-spacing:.5px;cursor:pointer;backdrop-filter:blur(2px)}
  body.sun #mapbtns button{background:rgba(255,255,255,.75);color:#111}
  #mapbtns button.on{box-shadow:0 0 0 2px var(--accent)}
  #threeD{position:fixed;inset:0;background:var(--bg);z-index:50;display:none;flex-direction:column}
  #threeD.open{display:flex}
  #d3c{flex:1;touch-action:none;width:100%}
  #threeDbar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px}
  #threeDbar span{font-size:13px;font-weight:700;letter-spacing:.5px}
  #threeDbar button{background:var(--card);border:1px solid var(--line);color:var(--text);
    border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer}
  #d3hint{text-align:center;font-size:10px;color:var(--dim);padding:8px}
  #map{display:block;width:100%;height:auto;max-height:66vh;margin:0 auto;touch-action:manipulation}
  #maphint{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-size:10px;color:var(--dim);pointer-events:none}
  #profile{display:none;background:var(--card);border-radius:10px;margin:8px 0 2px;padding:6px 8px 3px}
  #profile.on{display:block}
  #profile svg{width:100%;display:block}
  .dist .box.center{cursor:pointer}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:10px}
  .panel h2{font-size:11px;color:var(--dim);letter-spacing:1px;font-weight:600;margin-bottom:6px}
  .hazrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;
    border-bottom:1px solid var(--line);font-size:14px}
  .hazrow:last-child{border-bottom:none}
  .hazrow .ic{width:14px;height:14px;border-radius:4px;display:inline-block;margin-right:8px;vertical-align:-2px}
  .ic.bunker{background:var(--sand)} .ic.water{background:var(--water)} .ic.dogleg{background:var(--accent2);border-radius:50%}
  .hazrow .nums{font-variant-numeric:tabular-nums;color:var(--dim);font-size:13px}
  .hazrow .nums b{color:var(--text);font-size:15px;font-weight:700}

  /* ---- running scorecard ---- */
  #scstrip{display:flex;justify-content:space-around;align-items:center;gap:4px;background:var(--card);
    border:1px solid var(--line);border-radius:12px;padding:5px 10px;margin-bottom:10px}
  #scstrip .grp{display:flex;align-items:center;gap:3px;font-size:10px;font-weight:800;color:var(--text);letter-spacing:.4px}
  #scstrip .grp b{font-size:22px;color:var(--text);min-width:22px;text-align:center;font-variant-numeric:tabular-nums}
  #scstrip button{width:30px;height:38px;border-radius:8px;border:1px solid var(--line);background:none;
    color:var(--text);font-size:18px;font-weight:700;cursor:pointer;flex:none}
  #scTot{text-align:center;font-size:14px;font-weight:800;color:var(--accent2);cursor:pointer;line-height:1.35;flex:none;letter-spacing:.5px}
  #scTot b{color:var(--accent2);font-size:19px}
  #scTot #scThru{font-weight:600;color:var(--dim)}
  #scorecard{position:fixed;inset:0;background:#f2e9d6;z-index:60;display:none;flex-direction:column;padding:4px 12px 10px}
  #scorecard.open{display:flex}
  #scbar{display:flex;justify-content:space-between;align-items:center;padding:0 2px 4px;position:relative;z-index:2}
  #scbar span{font-size:13px;font-weight:700;letter-spacing:.5px;color:#1b3a66}
  #scTitleWrap{display:flex;flex-direction:column;line-height:1.15}
  #scBrand{font-size:10px;font-weight:800;letter-spacing:1.4px}
  #scbar button{background:#ffffff;border:1px solid #cfc3a2;color:#1b3a66;border-radius:8px;
    padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;margin-left:6px}
  #scClose{min-width:46px;min-height:40px;font-size:20px !important;font-weight:900 !important;line-height:1;padding:6px 10px !important}
  #scbar button{touch-action:manipulation}
  #scLogoWrap{text-align:center;padding:0;pointer-events:none} /* negative logo margins overlap scbar — must not steal taps from ✕ */
  #scLogo{width:min(340px,82%);height:auto;margin:-36px 0 -42px} /* the artwork has generous transparent margins — pull them in */
  /* the card itself: white boxes ruled in light blue, like the club's printed scorecard */
  #sctab{flex:1;overflow-y:auto;padding:0 14px}
  #sctab table{width:100%;border-collapse:separate;border-spacing:0;font-size:17px;
    font-variant-numeric:tabular-nums;background:#ffffff;color:#1b3a66;
    border:1.5px solid #9fc2ea;border-radius:14px;overflow:hidden}
  #sctab th,#sctab td{padding:8px 3px;text-align:center;background:#ffffff;
    border-bottom:1px solid #bcd6f2;border-right:1px solid #e2eefb}
  #sctab th:last-child,#sctab td:last-child{border-right:none}
  #sctab tr:last-child td{border-bottom:none}
  #sctab th{color:#4a6ea8;font-weight:700;font-size:12px;letter-spacing:.6px}
  #sctab td:first-child,#sctab th:first-child{text-align:left;padding-left:10px}
  /* hole-by-hole card: uniform column grid, everything centered */
  #sctab table.cardt{table-layout:fixed}
  #sctab table.cardt td:first-child,#sctab table.cardt th:first-child{text-align:center;padding-left:3px}
  #sctab td small{color:#7b93b8;font-size:11px}
  #sctab tr.cur td{color:#1f5fd0;font-weight:700}
  #sctab tr.tot td{font-weight:700;border-top:2px solid #9fc2ea}
  #sctab tr[data-h]{cursor:pointer}
  #scstats{padding:10px 4px;font-size:11px;color:#867d64;text-align:center}
  #scBackup{text-align:center;padding:2px 0 6px}
  #scBackup button{background:none;border:none;color:#7b93b8;font-size:11px;font-weight:600;cursor:pointer;padding:6px 10px;text-decoration:underline;text-underline-offset:2px}
  #scBackup button:active{color:#1f5fd0}

  #gps{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:700;color:var(--text);
    background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px 12px;margin-bottom:10px;gap:8px}
  #gps .dot{width:11px;height:11px;border-radius:50%;background:#666;display:inline-block;margin-right:7px;flex:none}
  #gps .dot.ok{background:#22c55e;box-shadow:0 0 5px #22c55e} #gps .dot.bad{background:var(--red)} #gps .dot.demo{background:var(--accent2)}
  #gps .dot.ok, #gps.live #gpsText{color:#1f9d54}
  #gps.live{font-weight:700}
  #demoBtn,#elevBtn,#windBtn{background:var(--card2);border:1px solid var(--line);color:var(--text);border-radius:7px;
    padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer}
  #windBtn{color:var(--blue);border-color:var(--blue)}  /* WIND in the app blue */
  #windBtn.on{background:rgba(133,185,234,.16)}
  #demoBtn{color:#1f9d54;border-color:#1f9d54}         /* GPS ON — green */
  #demoBtn.on{color:#b07d1a;border-color:var(--accent2);background:rgba(224,196,104,.14)} /* GPS OFF — amber */
  #elevBtn.on{color:var(--accent);border-color:var(--accent)}
  #windBtn.on{color:var(--blue);border-color:var(--blue)}  /* stay blue when active */

  footer{font-size:7px;color:var(--dim);text-align:center;margin-top:16px;line-height:1.4;opacity:.35}
  footer a{color:var(--dim)}
</style>
</head>

/* ============ TOPO: contours + elevation grid (USGS 3DEP) ============ */
function decodePolyline(s){
  const pts=[]; let i=0, lat=0, lng=0;
  while(i<s.length){
    for(const which of [0,1]){
      let r=0, sh=0, b;
      do{ b=s.charCodeAt(i++)-63; r|=(b&31)<<sh; sh+=5; }while(b>=32);
      const v=(r&1)?~(r>>1):(r>>1);
      if(which===0) lat+=v; else lng+=v;
    }
    pts.push([lat/1e5, lng/1e5]);
  }
  return pts;
}
const TOPO = (()=>{
  if(!TOPO_DATA) return null;
  const lines = TOPO_DATA.contours.map(c=>{
    const pts=decodePolyline(c.p);
    const las=pts.map(p=>p[0]), lns=pts.map(p=>p[1]);
    return {lvl:c.l, pts, bb:[Math.min(...las),Math.min(...lns),Math.max(...las),Math.max(...lns)]};
  });
  const unb64 = g => { const bin=atob(g.b64), z=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) z[i]=bin.charCodeAt(i); return {...g, z}; };
  return {lines, grid:unb64(TOPO_DATA.grid),
          patches:(TOPO_DATA.patches||[]).map(unb64),
          indexEvery:TOPO_DATA.index_every_ft};
})();
function bilinear(g, ll){ // bilinear elevation lookup on one grid; null if outside
  const gx=(ll.lng-g.lon0)*(111320*Math.cos(ll.lat*Math.PI/180))/g.step;
  const gy=(ll.lat-g.lat0)*111320/g.step;
  const x0=Math.floor(gx), y0=Math.floor(gy);
  if(x0<0||y0<0||x0>=g.nx-1||y0>=g.ny-1) return null;
  const fx=gx-x0, fy=gy-y0, at=(x,y)=>g.zmin_ft+g.z[y*g.nx+x]*g.zscale;
  return at(x0,y0)*(1-fx)*(1-fy)+at(x0+1,y0)*fx*(1-fy)+at(x0,y0+1)*(1-fx)*fy+at(x0+1,y0+1)*fx*fy;
}
function elevFt(ll){ // 3m green-complex patches take priority over the 10m base grid
  if(!TOPO) return null;
  for(const p of TOPO.patches){ const v=bilinear(p,ll); if(v!==null) return v; }
  return bilinear(TOPO.grid, ll);
}

/* ============ GEO MATH ============ */
const M_PER_YD = 0.9144;
function yds(a, b){ // a,b: {lat,lng}
  const r = Math.PI/180, dLa=(b.lat-a.lat)*r, dLo=(b.lng-a.lng)*r;
  const h = Math.sin(dLa/2)**2 + Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.sin(dLo/2)**2;
  return 6371000*2*Math.asin(Math.sqrt(h))/M_PER_YD;
}
function segDistYds(p, a, b){
  const mLat=111320, mLon=111320*Math.cos(p.lat*Math.PI/180);
  const px=(p.lng-a.lng)*mLon, py=(p.lat-a.lat)*mLat;
  const bx=(b.lng-a.lng)*mLon, by=(b.lat-a.lat)*mLat;
  const L2=bx*bx+by*by, t=L2?Math.max(0,Math.min(1,(px*bx+py*by)/L2)):0;
  return Math.hypot(px-t*bx, py-t*by)/M_PER_YD;
}
function polyRange(p, pts){ // min/max distance from p to polygon vertices
  let lo=Infinity, hi=0;
  for(const v of pts){ const d=yds(p,v); if(d<lo)lo=d; if(d>hi)hi=d; }
  return [Math.round(lo), Math.round(hi)];
}

try{ const s2=JSON.parse(localStorage.getItem('wbyc_pins')||'null'); if(s2 && s2.p) pins=s2; }catch(e){}
function freshPins(){ if(pins.d !== today()) pins = {d: today(), p: {}}; } // pins expire at midnight
function pinFor(h){ freshPins(); return pins.p[h.hole_number] || null; }
function target(h){ return pinFor(h) || h.green.center; } // every distance re-keys to the pin when set
function savePins(){ localStorage.setItem('wbyc_pins', JSON.stringify(pins)); }
let wind = {spd:0, dir:null, gust:0, src:null}; // dir = degrees wind blows FROM (meteorological); src: 'live'|'manual'
let weather = {code:null, day:true}; // WMO weather code + day/night, from Open-Meteo — drives subtle map flourishes
const DIRS=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
const dirName = d => DIRS[Math.round(d/22.5)%16];
function brg(a,b){ // compass bearing a→b, flat-earth approx (fine at course scale)
  const dx=(b.lng-a.lng)*Math.cos((a.lat+b.lat)*Math.PI/360), dy=b.lat-a.lat;
  return (Math.atan2(dx,dy)*180/Math.PI+360)%360;
}
/* ---- ball-flight trajectory (shared by the map arc, profile inset, and 3D tracer) ---- */
const TRACER={main:'#f000c2', bright:'#ffa5eb'}; // deep neon pink
function arcZ(t){ const u=Math.pow(t,1.25); return 4*u*(1-u); } // lift profile: apex past halfway, steeper descent
function apexM(dm){ return Math.min(38, 6+dm*0.14); } // apex height (m) for a carry of dm meters

function windYds(p,target,dist){ // adjustment in yds; + = plays longer. ~1%/mph headwind, ~0.5%/mph tailwind
  if(!windAdjust || !wind.src || wind.spd<1 || wind.dir===null) return 0;
  const hw = wind.spd*Math.cos((wind.dir-brg(p,target))*Math.PI/180); // + = headwind component
  const cl = Math.max(-30,Math.min(30,hw));
  return dist*(cl>0?0.010:0.005)*cl;
}
async function fetchWind(){
  if(!location.protocol.startsWith('http')) return;
  try{
    const c0=course.holes[0].green.center;
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${c0.lat.toFixed(4)}&longitude=${c0.lng.toFixed(4)}&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m,weather_code,is_day&wind_speed_unit=mph`);
    if(!r.ok) return;
    const j=await r.json();
    if(j.current){
      if(j.current.weather_code!=null) weather={code:j.current.weather_code, day:j.current.is_day!==0};
      if(wind.src!=='manual'){ // a manual setting wins for the session
        wind={spd:Math.round(j.current.wind_speed_10m), dir:j.current.wind_direction_10m,
              gust:Math.round(j.current.wind_gusts_10m||0), src:'live'};
        windUI();
      }
      render();
    }
  }catch(e){/* offline — manual entry still available */}
}
function windUI(){
  const b=$('windBtn');
  b.textContent = wind.src ? `WIND ${wind.spd} ${dirName(wind.dir)}${wind.src==='manual'?'*':''}` : 'WIND';
  b.classList.toggle('on', windAdjust && !!wind.src);
}
let satMode = localStorage.getItem('wbyc_base')==='sat';
let greenView=false; // zoom to green complex; session-only, resets on hole change
const GRAVS=[{name:'Earth',f:1,icon:'± ELEV'},{name:'the Moon',f:6.05,icon:'☾ MOON'},{name:'Mars',f:2.64,icon:'♂ MARS'}];
let gravIdx=0; // session-only whimsy; never persisted
let trail=[]; // recent player positions (dream-mode firefly)
const aced=new Set(); // demo-mode holes-in-one
let fixes=[], pos=null, acc=null, watchId=null;

const $ = id => document.getElementById(id);
const hole = () => course.holes[holeIdx];
const teeBox = h => h.tee_boxes.find(t=>t.name===tee) || h.tee_boxes[0];

/* ============ POSITION ============ */
function playerPos(){
  if(demo) return demoPos;
  return pos;
}
function pushFix(lat,lng,accuracy){
  fixes.push({lat,lng}); if(fixes.length>5) fixes.shift();
  pos = { lat: fixes.reduce((s,f)=>s+f.lat,0)/fixes.length,
          lng: fixes.reduce((s,f)=>s+f.lng,0)/fixes.length };
  acc = accuracy;
  if(autoHole && !demo) detectHole();
  render();
}
function startGeo(){
  if(!navigator.geolocation){ setDemo(true,'no geolocation support'); return; }
  // GPS requires a secure context — a lone file:// or plain-http copy can't get location, only the deployed https app can
  const secureGeo = location.protocol==='https:' || ['localhost','127.0.0.1'].includes(location.hostname);
  if(!secureGeo){
    setDemo(true,'needs the online app');
    gpsStatus('bad','GPS needs the installed app — demo mode for now');
    return;
  }
  watchId = navigator.geolocation.watchPosition(
    p => { if(demo) return;
      pushFix(p.coords.latitude, p.coords.longitude, p.coords.accuracy);
      gpsStatus('ok', `GPS ±${Math.round(p.coords.accuracy)}m · ${fixes.length}/5 fixes`); },
    e => { gpsStatus('bad', 'GPS unavailable — tap DEMO MODE');
           if(!pos && !demo) setDemo(true,'auto (no GPS)'); },
    { enableHighAccuracy:true, maximumAge:2000, timeout:15000 });
}
function gpsStatus(cls,msg){ $('gpsDot').className='dot '+cls; $('gpsText').textContent=msg; $('gps').classList.toggle('live', cls==='ok'); }
function setDemo(on, why){
  demo = on;
  const db=$('demoBtn');
  db.classList.toggle('on', on);          // 'on' = demo/manual active (amber)
  db.textContent = on ? 'GPS OFF' : 'GPS ON';
  if(on){
    const tb=teeBox(hole());
    demoPos = demoPos || {lat:tb.lat, lng:tb.lng};
    gpsStatus('demo', 'GPS off — tap map to move' + (why?` (${why})`:''));
  } else {
    gpsStatus(pos?'ok':'bad', pos?'GPS live':'waiting for GPS…');
  }
  render();
}
function detectHole(){
  const p = playerPos(); if(!p) return;
  let best=holeIdx, bd=Infinity;
  course.holes.forEach((h,i)=>{
    const cl=h.centerline;
    for(let s=0;s<cl.length-1;s++){
      const d=segDistYds(p, cl[s], cl[s+1]);
      if(d<bd){bd=d; best=i;}
    }
  });
  if(bd<200 && best!==holeIdx){ holeIdx=best; }
}

/* ============ SHOT TRACKING ============ */
const CLUBS=['D','3W','5W','3H','4i','5i','6i','7i','8i','9i','PW','GW','SW','LW'];
let shots=[]; try{ shots=JSON.parse(localStorage.getItem('wbyc_shots'))||[]; }catch(e){}
const saveShots=()=>localStorage.setItem('wbyc_shots', JSON.stringify(shots));
let curClub=localStorage.getItem('wbyc_club'); if(!CLUBS.includes(curClub)) curClub='7i';
const today=()=>new Date().toISOString().slice(0,10);
function markShot(){
  const p=playerPos(); if(!p) return;
  shots.push({d:today(), h:hole().hole_number, lat:p.lat, lng:p.lng, t:Date.now(), club:curClub});
  saveShots();
  const sb=$('shotBtn'); if(sb){ sb.classList.add('marking'); setTimeout(()=>sb.classList.remove('marking'),480); } // flash confirmation
  $('maphint').textContent=`shot ${shots.filter(s=>s.d===today()&&s.h===hole().hole_number).length} marked (${curClub})`;
  render();
}
function undoShot(){
  if(!shots.length) return;
  shots.pop(); saveShots();
  $('maphint').textContent='last shot mark removed';
  render();
}
function shotDists(){ // each mark's distance: to the next mark on the same hole, else to that green's center
  const out=[];
  for(let i=0;i<shots.length;i++){
    const s=shots[i], nx=shots[i+1];
    let end=null;
    if(nx && nx.d===s.d && nx.h===s.h) end={lat:nx.lat,lng:nx.lng};
    else{ const hh=course.holes.find(x=>x.hole_number===s.h); if(hh) end=hh.green.center; }
    if(end){ const y=yds(s,end); if(y>15 && y<400) out.push({club:s.club, y}); }
  }
  return out;
}
function clubStats(){ // median carry per club, all stored rounds
  const m={};
  shotDists().forEach(r=>{ (m[r.club]=m[r.club]||[]).push(r.y); });
  return CLUBS.map(c=>{ const a=(m[c]||[]).sort((x,y)=>x-y);
    return a.length ? {club:c, n:a.length, med:Math.round(a[(a.length-1)>>1])} : null; }).filter(Boolean);
}
const DEFDIST={D:220,'3W':200,'5W':185,'3H':175,'4i':165,'5i':155,'6i':145,'7i':135,'8i':125,'9i':115,PW:105,GW:90,SW:75,LW:60};
function clubDist(club){ // learned median once trusted (n>=2), stock number until then
  const st=clubStats().find(x=>x.club===club && x.n>=2);
  return st ? st.med : (DEFDIST[club]||null);
}
function suggestClub(distYds){ // closest learned median within 25 yds, needs >=2 samples
  let best=null, bd=1e9;
  for(const s of clubStats()){ if(s.n<2) continue;
    const d=Math.abs(s.med-distYds); if(d<bd){ bd=d; best=s; } }
  return bd<=25 ? best : null;
}

/* ============ SCORECARD ============ */
const blankCard=()=>({start:new Date().toISOString().slice(0,10), holes:Array.from({length:18},()=>({s:0,p:0,f:null}))});
let rounds=[]; try{ rounds=JSON.parse(localStorage.getItem('wbyc_rounds'))||[]; }catch(e){}
const saveRounds=()=>localStorage.setItem('wbyc_rounds', JSON.stringify(rounds));
function archiveRound(){ // bank the current card into history (called before NEW ROUND clears it)
  const t=cardTotals(); if(!t.n) return;
  rounds.push({date:card.start, tee, n:t.n, s:t.s, par:t.par, p:t.p, fwH:t.fwH, fwT:t.fwT, gir:t.gir,
               holes:card.holes.map(e=>({s:e.s,p:e.p,f:e.f}))});
  saveRounds();
}
let card=blankCard();
try{ const c=JSON.parse(localStorage.getItem('wbyc_card')); if(c&&c.holes&&c.holes.length===18) card=c; }catch(e){}
const saveCard=()=>localStorage.setItem('wbyc_card', JSON.stringify(card));
const fwdTee=()=> tee==='Red'||tee==='Green'; // forward sets score against women's par
const holePar=h=> fwdTee() ? h.par_women : h.par;
const holeHcp=h=> tee==='Green' ? (h.handicap_index_women_green ?? h.handicap_index_women)
             : tee==='Red'   ? h.handicap_index_women
             : tee==='Gold'  ? (h.handicap_index_gold ?? h.handicap_index)
             : h.handicap_index;
const fmtDiff=d=> d===0 ? 'E' : (d>0?'+':'')+d;
function cardTotals(){
  let s=0,p=0,par=0,n=0,fwH=0,fwT=0,gir=0;
  card.holes.forEach((e,i)=>{
    if(e.s>0){
      const hp=holePar(course.holes[i]);
      s+=e.s; p+=e.p; par+=hp; n++;
      if(hp>3){ fwT++; if(e.f===true) fwH++; }
      if(e.s-e.p<=hp-2) gir++;
    }
  });
  return {s,p,par,n,fwH,fwT,gir};
}
function renderScore(){
  const e=card.holes[holeIdx];
  $('scS').textContent=e.s||'·';
  $('scP').textContent=e.p||'·';
  const t=cardTotals();
  $('scTotV').textContent = t.n ? t.s : '';          // gross strokes; blank (no lonely dash) before any score
  $('scThru').textContent = t.n ? `thru ${t.n}` : '';
}
function renderCard(){
  const row=i=>{
    const h=course.holes[i], e=card.holes[i], hp=holePar(h);
    return `<tr class="${i===holeIdx?'cur':''}" data-h="${i}"><td>${h.hole_number}</td><td>${hp}</td>`
      +`<td>${e.s||''}</td><td>${e.p||''}</td>`   // raw score only — no per-hole +/- delta
      +`<td>${hp===3?'—':e.f===true?'✓':e.f===false?'✗':''}</td></tr>`;
  };
  const half=(a,b,label)=>{
    let s=0,p=0,par=0;
    for(let i=a;i<b;i++){ par+=holePar(course.holes[i]); const e=card.holes[i]; if(e.s>0){s+=e.s;p+=e.p;} }
    return `<tr class="tot"><td>${label}</td><td>${par}</td><td>${s||''}</td><td>${p||''}</td><td></td></tr>`;
  };
  let html='<table class="cardt"><tr><th>HOLE</th><th>PAR</th><th>SCORE</th><th>PUTTS</th><th>FW</th></tr>';
  for(let i=0;i<9;i++) html+=row(i);  html+=half(0,9,'OUT');
  for(let i=9;i<18;i++) html+=row(i); html+=half(9,18,'IN'); html+=half(0,18,'TOTAL');
  $('sctab').innerHTML=html+'</table>';
  const t=cardTotals();
  $('scstats').textContent = t.n
    ? `${t.n} holes · ${t.s} strokes · ${t.p} putts · FW ${t.fwH}/${t.fwT} · GIR ${t.gir}`
    : 'no scores yet — use the +/− strip on any hole · tap a row to jump there';
}
function renderClubs(){
  const st=clubStats();
  $('sctab').innerHTML='<table><tr><th>CLUB</th><th>MEDIAN YDS</th><th>SHOTS</th></tr>'
    +(st.length ? st.map(x=>`<tr><td>${x.club}</td><td>${x.med}</td><td>${x.n}</td></tr>`).join('')
                : '<tr><td colspan="3" style="text-align:center;color:var(--dim)">no shots tracked yet — pick a club and tap SHOT at your ball</td></tr>')
    +'</table>';
  const tot=shotDists().length;
  $('scstats').textContent=tot?`${tot} tracked shots, all rounds · medians feed the club hint under CENTER`:'distances learn from your SHOT marks';
}
function renderStats(){
  const full=rounds.filter(r=>r.n===18);
  let html='';
  if(rounds.length>=2){ // vs-par trend, last 10 rounds (9-hole rounds normalized)
    const pts=rounds.slice(-10).map(r=>(r.s-r.par)*(r.n?18/r.n:1));
    const mn=Math.min(...pts), spn=Math.max(Math.max(...pts)-mn,1), W=260, H=40;
    const xy=pts.map((v,i)=>[(i/(pts.length-1)*W).toFixed(0), (H-4-(v-mn)/spn*(H-8)).toFixed(0)]);
    html+=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:340px;height:44px;display:block;margin:0 auto 8px">`
      +`<polyline points="${xy.map(q=>q.join(',')).join(' ')}" fill="none" stroke="var(--accent2)" stroke-width="2" opacity=".9"/>`
      +xy.map(q=>`<circle cx="${q[0]}" cy="${q[1]}" r="2.5" fill="var(--accent2)"/>`).join('')+'</svg>';
  }
  const row=r=>`<tr><td>${r.date}</td><td>${r.tee}</td>`
    +`<td>${r.s}${r.n===18?` <small>${fmtDiff(r.s-r.par)}</small>`:` <small>(${r.n}h)</small>`}</td>`
    +`<td>${r.p||''}</td><td>${r.fwT?Math.round(100*r.fwH/r.fwT)+'%':''}</td><td>${r.gir||''}</td></tr>`;
  html+='<table><tr><th>DATE</th><th>TEE</th><th>SCORE</th><th>PUTTS</th><th>FW</th><th>GIR</th></tr>'
    +(rounds.length ? rounds.slice().reverse().slice(0,20).map(row).join('')
                    : '<tr><td colspan="6" style="text-align:center;color:var(--dim)">no rounds banked yet — finish a round, then tap NEW to save it here</td></tr>')
    +'</table>';
  $('sctab').innerHTML=html;
  if(full.length){
    const best=full.reduce((a,r)=>(r.s-r.par)<(a.s-a.par)?r:a);
    const l5=full.slice(-5), av=k=>l5.reduce((s2,r)=>s2+r[k],0)/l5.length;
    $('scstats').textContent=`${rounds.length} round${rounds.length>1?'s':''} · best ${best.s} (${fmtDiff(best.s-best.par)}) ${best.date}`
      +` · last ${l5.length}: avg ${av('s').toFixed(1)}, ${av('p').toFixed(1)} putts, GIR ${av('gir').toFixed(1)}`;
  } else $('scstats').textContent = rounds.length ? 'averages & bests unlock with a full 18-hole round' : 'your game over time, banked automatically at NEW';
}

/* ============ RENDER ============ */
function fmt(d){ return d==null ? '–' : String(Math.round(d)); }

function render(){
  if(render.lastH!==holeIdx){ // leaving a hole exits green view and any pinch zoom
    render.lastH=holeIdx;
    mapZoom=null;
    if(greenView){ greenView=false; $('grnBtn').classList.remove('on'); }
  }
  const h = hole(), p = playerPos(), tb = teeBox(h);
  $('holeNum').textContent = 'Hole ' + h.hole_number;
  const par = holePar(h);
  const hcp = holeHcp(h);
  $('holeMeta').innerHTML = `Par ${par} · ${tb.yardage} yds<br>Hcp ${hcp}`;
  document.querySelectorAll('.tees button').forEach(b=>{
    b.className = (b.dataset.tee===tee?'sel ':'')+(b.dataset.tee===tee?b.dataset.tee:'');
  });

  const g = h.green;
  $('dCLbl').textContent = pinFor(h) ? 'PIN' : 'CENTER';
  $('pinBtn').classList.toggle('on', !!pinFor(h));
  if(p){
    const tgt = target(h);
    const dc = yds(p,tgt);
    $('dFront').textContent  = fmt(yds(p,g.front));
    $('dCenter').textContent = fmt(dc);
    $('dBack').textContent   = fmt(yds(p,g.back));
    // "plays like": elevation (~1 yd per 3 ft) + wind (head/tail component)
    let plays='', adj=dc, dFt=0;
    if(elevAdjust){
      const pe=elevFt(p), ge=elevFt(tgt);
      if(pe!==null && ge!==null){ dFt=Math.round(ge-pe); adj=dc+dFt/3; }
    }
    const wYd=Math.round(windYds(p,tgt,dc));
    adj+=wYd;
    const grav=GRAVS[gravIdx];
    if(gravIdx>0) plays=`plays ${Math.round(adj/grav.f)} on ${grav.name}`;
    else{
      const bits=[];
      if(Math.abs(dFt)>=3) bits.push(`${dFt>0?'+':''}${dFt} ft`);
      if(Math.abs(wYd)>=1) bits.push(`wind ${wYd>0?'+':''}${wYd}`);
      if(bits.length) plays=`plays ${Math.round(adj)} (${bits.join(', ')})`;
      const sug=suggestClub(Math.round(adj)); // learned club, once SHOT marks teach it
      if(sug) plays=(plays||`plays ${Math.round(adj)}`)+` · ${sug.club}`;
    }
    $('playsLike').textContent=plays;
    // dream-mode firefly trail bookkeeping
    if(!trail.length || yds(trail[trail.length-1],p)>1){ trail.push({lat:p.lat,lng:p.lng}); if(trail.length>5) trail.shift(); }
  } else {
    $('dFront').textContent=$('dCenter').textContent=$('dBack').textContent='–';
    $('playsLike').textContent='';
  }
  renderHazards(h,p,g);
  renderMap(h,p,tb);
  renderProfile(h,p);
  renderScore();
}

function renderHazards(h,p,g){
  const rows=[];
  if(p){
    // dogleg targets: centerline vertices between tee and green
    h.centerline.slice(1,-1).forEach((v,i)=>{
      const d=yds(p,v);
      if(d>20) rows.push({sort:d, html:
        `<span><span class="ic dogleg"></span>Dogleg corner ${h.centerline.length>3?(i+1):''}</span>
         <span class="nums"><b>${Math.round(d)}</b></span>`});
    });
    h.hazards.forEach(hz=>{
      const [lo,hi]=polyRange(p,hz.points);
      if(lo>350) return; // out of relevance
      const label = hz.type==='water' ? 'Water' : 'Bunker';
      rows.push({sort:lo, html:
        `<span><span class="ic ${hz.type}"></span>${label}</span>
         <span class="nums"><b>${lo}</b> / ${hi} carry</span>`});
    });
    rows.sort((a,b)=>a.sort-b.sort);
  }
  rows.push({sort:1e9, html:
    `<span>Green depth</span><span class="nums"><b>${g.depth_yds}</b> yds</span>`});
  $('hazList').innerHTML = rows.map(r=>`<div class="hazrow">${r.html}</div>`).join('');
}

/* ---- flight profile inset: terrain cross-section + trajectory (tap CENTER to toggle) ---- */
let profOn = localStorage.getItem('wbyc_prof')==='on';
function renderProfile(h,p){
  const el=$('profile');
  const hide=()=>{ el.classList.remove('on'); el.innerHTML=''; };
  if(!profOn || !p || !TOPO){ hide(); return; }
  const c=target(h), dTot=yds(p,c);
  if(dTot<12){ hide(); return; }
  const N=44, es=[];
  for(let i=0;i<=N;i++){
    const t=i/N;
    es.push(elevFt({lat:p.lat+(c.lat-p.lat)*t, lng:p.lng+(c.lng-p.lng)*t}));
  }
  if(es[0]===null || es[N]===null){ hide(); return; }
  for(let i=1;i<N;i++) if(es[i]===null){ // bridge interior gaps in the grid
    let j=i+1; while(j<N && es[j]===null) j++;
    for(let k2=i;k2<j;k2++) es[k2]=es[i-1]+(es[j]-es[i-1])*(k2-i+1)/(j-i+1);
    i=j;
  }
  const dm=dTot*0.9144, apxFt=apexM(dm)/0.3048;
  const arcAt=t=>es[0]+(es[N]-es[0])*t + apxFt*arcZ(t);
  let lo=Infinity, hi=-Infinity;
  for(let i=0;i<=N;i++){
    if(es[i]<lo)lo=es[i]; if(es[i]>hi)hi=es[i];
    const az2=arcAt(i/N); if(az2>hi)hi=az2;
  }
  const W=340,H=72,pt2=10,pb=8;
  const sy=(H-pt2-pb)/Math.max(hi-lo,6);
  const X=i=>(i/N*W).toFixed(1), Y=v=>(H-pb-(v-lo)*sy).toFixed(1);
  let terr='M0 '+H;
  for(let i=0;i<=N;i++) terr+=`L${X(i)} ${Y(es[i])}`;
  terr+=`L${W} ${H}Z`;
  // green surface span along the line of play
  const dF=yds(p,h.green.front), dB=yds(p,h.green.back);
  const t0g=Math.max(0,Math.min(dF,dB)/dTot), t1g=Math.min(1,Math.max(dF,dB)/dTot);
  let gseg='';
  for(let i=Math.ceil(t0g*N); i<=Math.floor(t1g*N); i++) gseg+=(gseg?'L':'M')+X(i)+' '+Y(es[i]);
  let arc='';
  for(let i=0;i<=N;i++) arc+=(i?'L':'M')+X(i)+' '+Y(arcAt(i/N));
  const dFt=Math.round(es[N]-es[0]);
  const pinY=+Y(es[N]);
  el.innerHTML=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="height:${H}px">`
    +`<path class="pterr" d="${terr}" fill="var(--topo)" fill-opacity=".28" stroke="var(--topo-index)" stroke-width="1" stroke-opacity=".6"/>`

      ctx.fillStyle=sunMode?`rgba(45,45,55,${al.toFixed(2)})`:`rgba(232,238,246,${al.toFixed(2)})`;
      if(l2s){ ctx.strokeText(l2s, tx, ap[1]+11); ctx.fillText(l2s, tx, ap[1]+11); }
      ctx.strokeText(l3, tx, ap[1]+(l2s?28:11));
      ctx.fillText(l3, tx, ap[1]+(l2s?28:11));
      ctx.textAlign='left';
    }
  }
}
function open3D(){
  const h=hole();
  D3.holeN=holeIdx; D3.az=0; D3.el=0.95; D3.zoom=1; D3.ex=1.6;
  $('d3ex').value=1.6;
  D3.mesh=build3D(h);
  // flag position: green-classified mesh vertex nearest the green center (frame origin pre-centering)
  const m=D3.mesh; let best=null,bd=Infinity;
  for(let i=0;i<m.cls.length;i++) if(m.cls[i]===1){
    const v=m.verts[i], d=v[0]*v[0]+v[1]*v[1];
    if(d<bd){bd=d;best=v;}
  }
  D3.flagWorld=best;
  const pn3=pinFor(h); if(pn3) D3.flagWorld=D3.mesh.toWorld(pn3); // flag + tracer land on today's pin
  $('d3Title').textContent=`HOLE ${h.hole_number} · PAR ${holePar(h)} · 3D TERRAIN`;
  $('threeD').classList.add('open');
  D3.open=true;
  requestAnimationFrame(draw3D);
  startTracer(h);
  if(D3.mesh.hasWater){ // gentle shimmer loop (~18 fps), only on holes with water
    D3.lastT=0;
    const loop=ts=>{ if(!D3.open) return;
      if(ts-D3.lastT>55){ D3.lastT=ts; draw3D(); }
      requestAnimationFrame(loop); };
    requestAnimationFrame(loop);
  }
}
function close3D(){ $('threeD').classList.remove('open'); D3.open=false; D3.mesh=null; D3.tracer=null; }
function startTracer(h){
  D3.tracer=null;
  const m=D3.mesh; if(!m||!m.toWorld) return;
  const p=playerPos(), c=h.green.center, tb=teeBox(h);
  const holeLen=yds({lat:tb.lat,lng:tb.lng},c);
  const from=(p && yds(p,c)<holeLen*1.6+120)?p:tb; // your ball if you're on the hole, else the tee
  const a=m.toWorld(from), b=D3.flagWorld||m.toWorld(c);
  const dx=b[0]-a[0], dy=b[1]-a[1], dm=Math.hypot(dx,dy);
  if(dm<15) return; // already on the green — nothing to trace
  const apx=apexM(dm);
  let cwx=0, cwy=0; // crosswind drift, grows late in flight
  if(windAdjust && wind.src && wind.spd>=1 && wind.dir!==null){
    const br=(wind.dir+180)*Math.PI/180;            // blowing-to bearing
    const wv=m.rotV(Math.sin(br), Math.cos(br));    // into the hole frame
    const px=-dy/dm, py=dx/dm;
    const drift=(wv[0]*px+wv[1]*py)*Math.min(wind.spd,30)*0.35; // meters, capped
    cwx=px*drift; cwy=py*drift;
  }
  const pts=[];
  for(let i=0;i<=48;i++){
    const t=i/48, d2=t*t;
    pts.push([a[0]+dx*t+cwx*d2, a[1]+dy*t+cwy*d2, a[2]+(b[2]-a[2])*t+apx*arcZ(t)]);
  }
  let apexI=24, bestH=-1; // highest point of the lift profile, for stat placement
  for(let i=0;i<=48;i++){ const hh=apx*arcZ(i/48); if(hh>bestH){ bestH=hh; apexI=i; } }
  // flight stats: same math as the plays-like readout, pinned to the arc
  const dcY=yds(from,c);
  let adj=dcY, dFt=0;
  if(elevAdjust){ const pe=elevFt(from), ge=elevFt(c);
    if(pe!==null && ge!==null){ dFt=Math.round(ge-pe); adj+=dFt/3; } }
  const wYd=Math.round(windYds(from,c,dcY)); adj+=wYd;
  const sug=suggestClub(Math.round(adj));
  const stats={yds:Math.round(dcY), plays:Math.round(adj), dFt, wYd,
               club:sug?sug.club:null, apexFt:Math.round(apx/0.3048)};
  const t0=(typeof performance!=='undefined'?performance.now():Date.now());
  D3.tracer={pts, t0, dur:900+dm*2.2, apexI, stats};
  const loop=()=>{ if(!D3.open||!D3.tracer) return;
    const el2=(typeof performance!=='undefined'?performance.now():Date.now())-t0;
    draw3D();
    if(el2<D3.tracer.dur+950) requestAnimationFrame(loop); // linger for the landing pulse
  };
  requestAnimationFrame(loop);
}
function wire3D(){
  const cv=$('d3c');
  let drag=null, pinch=null;
  cv.addEventListener('pointerdown',e=>{ drag=[e.clientX,e.clientY]; cv.setPointerCapture(e.pointerId); });
  cv.addEventListener('pointermove',e=>{
    if(!drag||!D3.open) return;
    D3.az += (e.clientX-drag[0])*0.008;
    D3.el = Math.max(0.28, Math.min(1.45, D3.el + (e.clientY-drag[1])*0.005));
    drag=[e.clientX,e.clientY];
    D3.fast=true; // coarse mesh mid-drag for smooth orbiting
    requestAnimationFrame(draw3D);
  });
  cv.addEventListener('pointerup',()=>{ drag=null;
    if(D3.open){ D3.fast=false; requestAnimationFrame(draw3D); } }); // settle at full resolution
  cv.addEventListener('wheel',e=>{ e.preventDefault();
    D3.zoom=Math.max(0.5,Math.min(3,D3.zoom*(e.deltaY<0?1.1:0.9)));
    requestAnimationFrame(draw3D); },{passive:false});
  cv.addEventListener('touchstart',e=>{ if(e.touches.length===2) pinch=Math.hypot(
    e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); },{passive:true});
  cv.addEventListener('touchmove',e=>{ if(e.touches.length===2&&pinch){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    D3.zoom=Math.max(0.5,Math.min(3,D3.zoom*d/pinch)); pinch=d;
    requestAnimationFrame(draw3D); } },{passive:true});
  $('d3Close').onclick=close3D;
  $('d3Trace').onclick=()=>{ if(D3.open) startTracer(hole()); };
  $('d3ex').addEventListener('input',e=>{ D3.ex=+e.target.value; requestAnimationFrame(draw3D); });
  window.addEventListener('resize',()=>{ if(D3.open) requestAnimationFrame(draw3D); });
}

/* tap-to-move in demo mode */
function mapTap(ev){
  if(!mapTransform) return;
  if(Date.now()-lastPinch<400) return; // settling fingers after a pinch aren't a tap
  const svg=mapTransform.svg, r=svg.getBoundingClientRect();
  const vb=svg.viewBox.baseVal;
  const X=vb.x + (ev.clientX-r.left)/r.width*vb.width;
  const Y=vb.y + (ev.clientY-r.top)/r.height*vb.height;
  const ll=mapTransform.unrot(X,Y);
  if(pinArm){ // this tap drops today's pin instead of moving the player
    const h=hole();
    if(yds(ll, h.green.center) <= 60){
      freshPins();
      pins.p[h.hole_number]={lat:ll.lat, lng:ll.lng}; savePins();
      pinArm=false; render();
      $('maphint').textContent='⛳ pin set for today';
    } else $('maphint').textContent='closer to the green, please';
    return;
  }
  if(!demo){
    if(pos) return;              // GPS is live — ignore stray taps so the ball stays locked on you
    setDemo(true,'tap');         // no GPS fix yet — a tap enters demo so you can position by hand
  }
  demoPos=ll;
  // easter egg: land the tap on the pin (≤3 yds) on all 18 holes
  if(yds(demoPos, hole().green.center) <= 3){
    aced.add(hole().hole_number);
    $('maphint').textContent = aced.size===18 ? '⛳ A PERFECT 18!' : `⛳ hole-in-one! (${aced.size}/18)`;
    if(aced.size===18) confetti();
  }
  render();
}
function confetti(){
  if(document.getElementById('confetti')) return;
  const d=document.createElement('div'); d.id='confetti';
  let html='';
  for(let i=0;i<44;i++)
    html+=`<b style="left:${(Math.random()*100).toFixed(1)}vw;animation-delay:${(Math.random()*1.6).toFixed(2)}s"></b>`;
  d.innerHTML=html;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(), 6500);
}

/* ============ INIT ============ */

  $('teeRow').innerHTML = course.tees.map(t=>
    `<button data-tee="${t.name}">${t.name.toUpperCase()}<br><span style="font-size:10px;font-weight:400">${t.total_yardage}</span></button>`).join('');
  document.querySelectorAll('.tees button').forEach(b=>b.onclick=()=>{
    tee=b.dataset.tee; localStorage.setItem('wbyc_tee',tee); render();

  const eb=$('elevBtn');
  eb.classList.toggle('on', elevAdjust && !!TOPO);

  let lpTimer=null, lpFired=false;
  eb.onclick=()=>{

  eb.addEventListener('pointerdown',()=>{
    lpTimer=setTimeout(()=>{

  ['pointerup','pointerleave','pointercancel'].forEach(ev=>eb.addEventListener(ev,()=>clearTimeout(lpTimer)));
  // WIND: tap toggles adjustment; long-press = manual speed/direction (offline-friendly)
  const wb=$('windBtn');
  let wlpTimer=null, wlpFired=false;
  wb.onclick=()=>{
    if(wlpFired){ wlpFired=false; return; }
    windAdjust=!windAdjust;
    localStorage.setItem('wbyc_wind', windAdjust?'on':'off');
    windUI(); render();
  };
  wb.addEventListener('pointerdown',()=>{
    wlpTimer=setTimeout(()=>{
      wlpFired=true;
      const sIn=prompt('Wind speed (mph)?', wind.spd||'10');
      if(sIn===null) return;
      const sp=parseFloat(sIn); if(isNaN(sp)||sp<0) return;
      const dIn=prompt('Blowing FROM? (N, NNE, NE … or degrees)', wind.dir!==null?dirName(wind.dir):'SW');
      if(dIn===null) return;
      const di=DIRS.indexOf(dIn.trim().toUpperCase());
      const deg=di>=0?di*22.5:parseFloat(dIn);
      if(isNaN(deg)) return;

    },550);
  });
  ['pointerup','pointerleave','pointercancel'].forEach(ev=>wb.addEventListener(ev,()=>clearTimeout(wlpTimer)));
  windUI(); fetchWind(); setInterval(fetchWind, 15*60*1000);
  // SCORECARD: +/− strip, FW cycle, full-card overlay
  const bump=(k,d)=>{ const e=card.holes[holeIdx]; e[k]=Math.max(0,Math.min(15,(e[k]||0)+d)); saveCard(); renderScore(); };
  $('scSp').onclick=()=>bump('s',1);  $('scSm').onclick=()=>bump('s',-1);

  let scMode='card';
  const scShow=()=>{

  // POST: copy hole-by-hole scores, open GHIN for manual posting (no credentials stored)
  $('scPost').onclick=async()=>{

    const txt=`WBYC ${card.start} (${tee} tees)${pname?` — ${pname}`:''} — Out ${out} In ${inn} Total ${t.s}`
      +(t.n<18?` (${t.n}/18 holes)`:'')

  $('scExport').onclick=()=>{

}
/* ============ THEME: dark → sun → dream ============ */
/* default: sun 10am–5pm until the user chooses; manual choice then sticks */
let theme = (() => {
  const saved = localStorage.getItem('wbyc_theme');
  if (['dark','sun','dream'].includes(saved)) return saved;
  const h = new Date().getHours();
  return (h >= 10 && h < 17) ? 'sun' : 'dark';
})();
let sunMode = theme === 'sun'; // kept in sync by applyTheme
const RAMPS = { // bright, saturated 'lush' greens
  sun:   [[246,252,240],[170,236,190],[96,196,136]], // 3-stop: daytime relief reads (low=deep, high=pale)
  dark:  [[68,202,128],[168,255,197]],
  dream: [[10,12,42],[20,110,130],[152,52,192]]  // aurora: indigo → teal → magenta
};
const rampCol = (stops, t) => {
  const n = stops.length-1, seg = Math.min(n-1, Math.floor(t*n)), f = t*n-seg;
  return [0,1,2].map(k => stops[seg][k]+(stops[seg+1][k]-stops[seg][k])*f);
};
function applyTheme(){
  sunMode = theme === 'sun';
  document.body.classList.toggle('sun', theme==='sun');
  document.body.classList.toggle('dream', theme==='dream');
  $('sunBtn').textContent = theme==='dark' ? '☀' : theme==='sun' ? '✦' : '☾';
  $('sunBtn').title = theme==='dark' ? 'Sunlight mode' : theme==='sun' ? 'Dream mode' : 'Dark mode';
  const tc = document.querySelector('meta[name="theme-color"]');
  if(tc) tc.content = theme==='sun' ? '#f7f5f0' : theme==='dream' ? '#0b0b2a' : '#0e1512';
}
function initTheme(){
  applyTheme();
  $('sunBtn').onclick = () => {
    theme = theme==='dark' ? 'sun' : theme==='sun' ? 'dream' : 'dark';
    localStorage.setItem('wbyc_theme', theme);
    applyTheme();
    if(course) render(); // re-render so tint/contours match the theme
  };
}

/* ============ PWA: service worker + screen wake lock ============ */
function initPwa(){
  const secure = location.protocol==='https:' || ['localhost','127.0.0.1'].includes(location.hostname);
  if(secure && 'serviceWorker' in navigator)
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  let wl=null;
  const keepAwake = async ()=>{ try{
    if('wakeLock' in navigator){ wl=await navigator.wakeLock.request('screen');
      $('gpsText').title='screen wake lock active'; }
  }catch(e){} };
  document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') keepAwake(); });
  keepAwake();
}

/* prefer live JSON when served over http(s); embedded copy otherwise */
(async ()=>{
  let data=EMBEDDED_COURSE;
  if(location.protocol.startsWith('http')){
    try{ const r=await fetch('course_data_v2.json'); if(r.ok) data=await r.json(); }catch(e){}
  }
  init(data);
  initTheme();
  initPwa();
})();
